version = 0.1

[default.global.parameters]
stack_name = "personal-trainer-prod"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name        = "personal-trainer-prod"
s3_prefix         = "personal-trainer"
region            = "us-east-1"
profile           = "pessoal-hotmail"
capabilities      = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = false
resolve_s3        = true
# WebhookSecret/OpenAiApiKey/FusionApiKey: NoEcho, Default="" no template — já setados no
# stack via --parameter-overrides em deploys anteriores. De propósito NÃO ficam aqui: omitir
# o parâmetro faz o CloudFormation reusar o valor atual do stack (UsePreviousValue); se algum
# deles for incluído aqui com um valor (ex.: placeholder), o próximo deploy SOBRESCREVE o
# segredo real em produção. Só passar via --parameter-overrides pontual quando for, de fato,
# trocar o segredo.
parameter_overrides = "Stage=prod DeployFrontendInfra=true FrontendUrl=https://coachpilot.com.br VapidPublicKey=BLnFHVWhjZpTrAAzkJzfnA_rCAOEmlU0NgnWSGl7hgylqfqpypD0BZ_J01axmeqr6dU64uFZo8egzO2gEeiLRvQ"
# VapidPrivateKey (NoEcho) — passar 1x via: sam deploy --parameter-overrides "VapidPrivateKey=SQzjIeP4b6L6xysKyYB8gPdxYUoApoCsA-ZQ_q6CFgc"
# Após o primeiro deploy o CloudFormation retém o valor; deploys futuros omitem o override.

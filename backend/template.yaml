AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Personal Trainer — SaaS serverless (FastAPI + DynamoDB + Cognito + W-API)"

# Conta: 421219980792 (pessoal-hotmail) | Region: us-east-1 | Stack: personal-trainer-prod
# Padrões: ARCHITECTURE.md (genérico) + ESPEC_TECNICA.md (modelo deste produto).

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
  ProjectName:
    Type: String
    Default: personal-trainer
  WebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Token opaco que protege o endpoint público do webhook W-API (ESPEC §7)."
  WapiBaseUrl:
    Type: String
    Default: "https://api.w-api.app"
  WebhookBaseUrl:
    Type: String
    Default: ""
    Description: "Base pública da API (execute-api) p/ auto-configurar o webhook na W-API. Evita dependência circular com o ApiGateway."
  FrontendUrl:
    Type: String
    Default: ""
    Description: "URL do portal (coachpilot.com.br) — p/ links de cadastro e uso geral."
  AlunoFrontendUrl:
    Type: String
    Default: "https://app.coachpilot.com.br"
    Description: "URL do subdomínio do app do aluno — p/ magic-link enviado pelo WhatsApp."
  OpenAiApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "API Key da OpenAI — key SEPARADA deste app (custo isolado)."
  OpenAiModel:
    Type: String
    Default: "gpt-5.4-nano"
  LlmProvider:
    Type: String
    Default: "openai"
    AllowedValues: ["openai", "fusion"]
    Description: "Provider do agente — trocar é reversível (sem mudar código), só este parâmetro."
  FusionApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Token do gateway interno Fusion LLM (formato Azure OpenAI) — só usado quando LlmProvider=fusion."
  FusionBaseUrl:
    Type: String
    Default: "https://fusion-llm.brq.com"
  FusionApiVersion:
    Type: String
    Default: "2025-03-01-preview"
  DeployFrontendInfra:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  DomainName:
    Type: String
    Default: "coachpilot.com.br"
    Description: "Domínio apex custom do frontend (Route53 + ACM + CloudFront alias)."
  AdminSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Chave para o header X-Admin-Key — protege POST /v1/wapi/config + assina tokens de impersonação."
  AdminEmail:
    Type: String
    Default: "admin@coachpilot.com.br"
    Description: "Email do superadmin — único usuário que pode chamar /v1/admin/* e usar impersonação."
  VapidPrivateKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Chave privada VAPID (PEM, newlines escapados como \\n) para Web Push notifications."
  VapidPublicKey:
    Type: String
    Default: ""
    Description: "Chave pública VAPID (base64url, 65 bytes) — exposta ao frontend para applicationServerKey."
  VapidSubject:
    Type: String
    Default: "mailto:admin@coachpilot.com.br"
    Description: "Email de contato para o servidor de push (sub do JWT VAPID)."
  MlAccessToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Access Token Mercado Pago DA PLATAFORMA — cobra o personal pela assinatura (Gestão Pro). Distinto do token que cada personal configura para cobrar seus próprios alunos."
  PromoCodeSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Segredo compartilhado com o FinPilot para geração de códigos promocionais (HMAC-SHA256). Gerado com openssl rand -hex 32."

Conditions:
  CreateFrontendInfra: !Equals [!Ref DeployFrontendInfra, "true"]

Globals:
  Function:
    Timeout: 29          # alinhado ao limite do HTTP API
    MemorySize: 1024     # reduz cold start ~5s→1.8s; duration free tier cobre até ~520 personais
    Runtime: python3.12
    Architectures: [arm64]
    Tags:
      Project: personal-trainer
      Owner: vinicius
      ManagedBy: SAM
    Environment:
      Variables:
        TABLE_NAME: !Ref MainTable
        COGNITO_USER_POOL_ID: !Ref UserPool
        COGNITO_REGION: !Ref AWS::Region
        STAGE: !Ref Stage
        WAPI_BASE_URL: !Ref WapiBaseUrl
        WEBHOOK_SECRET: !Ref WebhookSecret
        WEBHOOK_BASE_URL: !Ref WebhookBaseUrl
        FRONTEND_URL: !Ref FrontendUrl
        ALUNO_FRONTEND_URL: !Ref AlunoFrontendUrl
        MEDIA_BUCKET_NAME: !Sub "${ProjectName}-media-${Stage}-${AWS::AccountId}"
        OPENAI_API_KEY: !Ref OpenAiApiKey
        OPENAI_MODEL: !Ref OpenAiModel
        LLM_PROVIDER: !Ref LlmProvider
        FUSION_API_KEY: !Ref FusionApiKey
        FUSION_BASE_URL: !Ref FusionBaseUrl
        FUSION_API_VERSION: !Ref FusionApiVersion
        ADMIN_SECRET: !Ref AdminSecret
        ADMIN_EMAIL: !Ref AdminEmail
        VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
        VAPID_PUBLIC_KEY: !Ref VapidPublicKey
        VAPID_SUBJECT: !Ref VapidSubject
        ML_ACCESS_TOKEN: !Ref MlAccessToken
        PROMO_CODE_SECRET: !Ref PromoCodeSecret

Resources:

  # ── myApplications (AWS AppRegistry) — custo isolado por app ──────────────────
  TrainerApp:
    Type: AWS::ServiceCatalogAppRegistry::Application
    Properties:
      Name: !Sub "${ProjectName}-${Stage}"
      Description: "Personal Trainer — portal + agente WhatsApp serverless"
      Tags:
        Project: personal-trainer
        Owner: vinicius
        Stage: !Ref Stage
        ManagedBy: SAM

  AppStackAssociation:
    Type: AWS::ServiceCatalogAppRegistry::ResourceAssociation
    Properties:
      Application: !GetAtt TrainerApp.Id
      Resource: !Ref AWS::StackId
      ResourceType: CFN_STACK

  # ── Cognito (apenas o PERSONAL autentica — ESPEC §1.1) ───────────────────────
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-users-${Stage}"
      UserPoolTags:
        Project: personal-trainer
        Owner: vinicius
        Stage: !Ref Stage
        ManagedBy: SAM
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-web-${Stage}"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      # Removido (não bastou) e definido explicitamente: CloudFormation não reseta pra default
      # quando a propriedade só é omitida — precisa do valor explícito pra sair de ENABLED.
      PreventUserExistenceErrors: LEGACY
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_ADMIN_USER_PASSWORD_AUTH   # auth via CLI (testes/automação)
        - ALLOW_REFRESH_TOKEN_AUTH

  # ── API Gateway HTTP v2 (JWT authorizer nativo) ──────────────────────────────
  ApiGateway:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization, X-Impersonate]
        AllowOrigins: ["*"]
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient

  # ── Lambda FastAPI (monolambda) ──────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.main.handler
      CodeUri: ./
      Description: "Personal Trainer API (FastAPI + Mangum)"
      FunctionUrlConfig:           # webhook W-API bate direto aqui — sem custo de API Gateway
        AuthType: NONE
        Cors:
          AllowMethods: [POST]
          AllowOrigins: ["*"]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
        - S3CrudPolicy:
            BucketName: !Sub "${ProjectName}-media-${Stage}-${AWS::AccountId}"
        - Statement:
            - Effect: Allow
              Action: cognito-idp:ListUsers
              Resource: !GetAtt UserPool.Arn
      Events:
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Path: /v1/health
            Method: GET
            Auth:
              Authorizer: NONE
        PublicProxy:           # webhook W-API e demais rotas sem Cognito (ESPEC §7)
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Path: /v1/public/{proxy+}
            Method: ANY
            Auth:
              Authorizer: NONE
        AlunoProxy:            # app do aluno: JWT escopado validado na Lambda (ESPEC §1.5)
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Path: /v1/aluno/{proxy+}
            Method: ANY
            Auth:
              Authorizer: NONE
        AuthProxy:             # todo o resto exige JWT do personal
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Path: /{proxy+}
            Method: ANY

  # ── Scheduler (EventBridge diário — vencimentos de treino) ───────────────────
  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.scheduler.handler
      CodeUri: ./
      Description: "Notifica o personal sobre treinos vencendo (diário)"
      Timeout: 60        # processa lote (30 dias x partições) — 29s do Globals (CRUD) não basta
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MainTable
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: cron(0 9 * * ? *)   # 09:00 UTC, diariamente
            Name: !Sub "${ProjectName}-scheduler-${Stage}"
            Enabled: true

  # ── DynamoDB (single-table — ESPEC §2) ───────────────────────────────────────
  # GSI1 = "registros por exercício no tempo" (ESPEC §2.3/§4.1).
  # Projection ALL por ora; refinar p/ INCLUDE quando os atributos congelarem.
  # DynamoDB Streams p/ indicadores Nível B (ESPEC §3.1 / ARCHITECTURE §5.5): habilitar quando precisar.
  MainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-${Stage}"
      BillingMode: PAY_PER_REQUEST
      Tags:
        - { Key: Project, Value: personal-trainer }
        - { Key: Owner, Value: vinicius }
        - { Key: Stage, Value: !Ref Stage }
        - { Key: ManagedBy, Value: SAM }
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── S3 Media (mídia recebida da W-API; link da W-API expira — ESPEC §7) ──────
  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-media-${Stage}-${AWS::AccountId}"
      Tags:
        - { Key: Project, Value: personal-trainer }
        - { Key: ManagedBy, Value: SAM }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ["*"]
            MaxAge: 3600

  # ── CloudFront Function: roteia rotas SPA ao HTML correto antes do S3 ────────
  SpaRouterFunction:
    Type: AWS::CloudFront::Function
    Condition: CreateFrontendInfra
    Properties:
      Name: !Sub "${ProjectName}-spa-router-${Stage}"
      AutoPublish: true
      FunctionConfig:
        Comment: "Redireciona /aluno* para app.coachpilot.com.br; demais rotas SPA → index.html"
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri === '/aluno' || uri.indexOf('/aluno/') === 0 || uri.indexOf('/aluno?') === 0) {
            var parts = [];
            var qs = request.querystring;
            for (var k in qs) {
              if (Object.prototype.hasOwnProperty.call(qs, k)) {
                var mv = qs[k].multiValue;
                if (mv) {
                  for (var i = 0; i < mv.length; i++) parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(mv[i].value));
                } else {
                  parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(qs[k].value));
                }
              }
            }
            var loc = 'https://app.coachpilot.com.br' + uri + (parts.length ? '?' + parts.join('&') : '');
            return { statusCode: 301, headers: { location: { value: loc }, 'cache-control': { value: 'no-store' } } };
          }
          if (uri.indexOf('.') === -1) {
            request.uri = '/index.html';
          }
          return request;
        }

  # ── CloudFront Function para o app do aluno (app.coachpilot.com.br) ──────────
  AlunoSpaRouterFunction:
    Type: AWS::CloudFront::Function
    Condition: CreateFrontendInfra
    Properties:
      Name: !Sub "${ProjectName}-aluno-router-${Stage}"
      AutoPublish: true
      FunctionConfig:
        Comment: "Redireciona / → /aluno; demais rotas SPA → aluno.html"
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var uri = event.request.uri;
          if (uri === '/' || uri === '') {
            return { statusCode: 302, headers: { location: { value: '/aluno' } } };
          }
          if (uri.indexOf('.') === -1) {
            event.request.uri = '/aluno.html';
          }
          return event.request;
        }

  # ── S3 + CloudFront (frontend SPA — criar quando a conta estiver pronta) ─────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Condition: CreateFrontendInfra
    Properties:
      BucketName: !Sub "${ProjectName}-frontend-${Stage}-${AWS::AccountId}"
      Tags:
        - { Key: Project, Value: personal-trainer }
        - { Key: ManagedBy, Value: SAM }
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateFrontendInfra
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn:
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
                  - !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AlunoCloudFrontDistribution}"

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: CreateFrontendInfra
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac-${Stage}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  HostedZone:
    Type: AWS::Route53::HostedZone
    Condition: CreateFrontendInfra
    Properties:
      Name: !Ref DomainName
      HostedZoneTags:
        - { Key: Project, Value: personal-trainer }
        - { Key: ManagedBy, Value: SAM }

  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: CreateFrontendInfra
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "www.${DomainName}"
        - !Sub "*.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZone
        - DomainName: !Sub "www.${DomainName}"
          HostedZoneId: !Ref HostedZone
      Tags:
        - { Key: Project, Value: personal-trainer }
        - { Key: ManagedBy, Value: SAM }

  ApexAliasRecordA:
    Type: AWS::Route53::RecordSet
    Condition: CreateFrontendInfra
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  ApexAliasRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: CreateFrontendInfra
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwAliasRecordA:
    Type: AWS::Route53::RecordSet
    Condition: CreateFrontendInfra
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  WwwAliasRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: CreateFrontendInfra
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "www.${DomainName}"
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  AppAliasRecordA:
    Type: AWS::Route53::RecordSet
    Condition: CreateFrontendInfra
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "app.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt AlunoCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  AppAliasRecordAAAA:
    Type: AWS::Route53::RecordSet
    Condition: CreateFrontendInfra
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "app.${DomainName}"
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt AlunoCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: CreateFrontendInfra
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
          - !Sub "www.${DomainName}"
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig: {}
          - Id: ApiOrigin
            DomainName: !Sub "${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: !Sub "/${Stage}"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # CachingOptimized
          AllowedMethods: [GET, HEAD]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRouterFunction.FunctionMetadata.FunctionARN
        CacheBehaviors:
          - PathPattern: /v1/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        CustomErrorResponses:
          - { ErrorCode: 403, ResponseCode: 200, ResponsePagePath: /index.html }
          - { ErrorCode: 404, ResponseCode: 200, ResponsePagePath: /index.html }

  AlunoCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: CreateFrontendInfra
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: aluno.html
        Aliases:
          - !Sub "app.${DomainName}"
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig: {}
          - Id: ApiOrigin
            DomainName: !Sub "${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: !Sub "/${Stage}"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # CachingOptimized
          AllowedMethods: [GET, HEAD]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt AlunoSpaRouterFunction.FunctionMetadata.FunctionARN
        CacheBehaviors:
          - PathPattern: /v1/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        CustomErrorResponses:
          - { ErrorCode: 403, ResponseCode: 200, ResponsePagePath: /aluno.html }
          - { ErrorCode: 404, ResponseCode: 200, ResponsePagePath: /aluno.html }

Outputs:
  ApiUrl:
    Value: !Sub "${ApiGateway.ApiEndpoint}/${Stage}"
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  TableName:
    Value: !Ref MainTable
  MediaBucketName:
    Value: !Ref MediaBucket
  WebhookUrlBase:
    Description: "Legado — API Gateway (não usar para webhook W-API, prefira WebhookFunctionUrl)"
    Value: !Sub "${ApiGateway.ApiEndpoint}/${Stage}"
  WebhookFunctionUrl:
    Description: "URL direta da Lambda para webhook W-API (sem custo de API Gateway). Usar: {WebhookFunctionUrl}v1/public/wapi/webhook/{WebhookSecret}"
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  CloudFrontUrl:
    Condition: CreateFrontendInfra
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  CloudFrontDistributionId:
    Condition: CreateFrontendInfra
    Value: !Ref CloudFrontDistribution
  HostedZoneNameServers:
    Condition: CreateFrontendInfra
    Description: "Colar estes NS no painel da revenda (DNS do domínio coachpilot.com.br)."
    Value: !Join [", ", !GetAtt HostedZone.NameServers]
  CertificateArn:
    Condition: CreateFrontendInfra
    Value: !Ref SiteCertificate
  CustomDomainUrl:
    Condition: CreateFrontendInfra
    Value: !Sub "https://${DomainName}"
  AlunoCloudFrontUrl:
    Condition: CreateFrontendInfra
    Value: !Sub "https://app.${DomainName}"
  AlunoCloudFrontDistributionId:
    Condition: CreateFrontendInfra
    Value: !Ref AlunoCloudFrontDistribution

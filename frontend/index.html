<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000613" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CoachPilot" />
    <title>CoachPilot — Gestão para Personal Trainers</title>

    <!-- SEO -->
    <meta name="description" content="CoachPilot — Plataforma completa para personal trainers. Gerencie alunos, treinos, avaliações físicas e agenda em um só lugar. Experimente grátis." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://coachpilot.com.br/" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://coachpilot.com.br/" />
    <meta property="og:title" content="CoachPilot — Gestão para Personal Trainers" />
    <meta property="og:description" content="Plataforma completa para personal trainers. Gerencie alunos, treinos, avaliações físicas e agenda em um só lugar." />
    <meta property="og:image" content="https://coachpilot.com.br/og-image.jpg" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="CoachPilot" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CoachPilot — Gestão para Personal Trainers" />
    <meta name="twitter:description" content="Plataforma completa para personal trainers. Gerencie alunos, treinos, avaliações físicas e agenda em um só lugar." />
    <meta name="twitter:image" content="https://coachpilot.com.br/og-image.jpg" />

    <!-- Tema: aplica data-theme antes do bundle para evitar flash -->
    <script>
      (function() {
        var t = localStorage.getItem('pt:theme') || 'system';
        var e = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.setAttribute('data-theme', e);
        document.documentElement.style.colorScheme = e;
      })();
    </script>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CoachPilot",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Plataforma completa para personal trainers gerenciarem alunos, treinos, avaliações físicas e agenda.",
      "url": "https://coachpilot.com.br",
      "inLanguage": "pt-BR",
      "offers": {
        "@type": "Offer",
        "priceCurrency": "BRL",
        "price": "0",
        "description": "Plano gratuito disponível"
      },
      "provider": {
        "@type": "Organization",
        "name": "CoachPilot",
        "url": "https://coachpilot.com.br"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
